ext {
    extName = '24hNovel'
    extClass = 'TwentyFourHNovel'
    baseUrl = 'https://24hnovel.com'
    language = 'en'

    // REQUIRED for local / fork builds
    extVersionCode = 1
    extVersionName = '1.0.0'
}

apply from: "$rootDir/common.gradle"

android {
    signingConfigs {
        release {
            storeFile null
            storePassword null
            keyAlias null
            keyPassword null
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

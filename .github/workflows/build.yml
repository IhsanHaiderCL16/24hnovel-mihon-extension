name: Build Mihon Extension (Debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build 24hNovel extension (DEBUG)
        run: ./gradlew :src:all:twentyfourhnovel:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: twentyfourhnovel-debug-apk
          path: src/all/twentyfourhnovel/build/outputs/apk/debug/*.apk
